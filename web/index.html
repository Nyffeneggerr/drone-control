<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Drone Control</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="status-bar" class="status status-disconnected">
    <span id="status-text">DISCONNECTED</span>
    <span id="link-text"></span>
  </div>

  <div id="alerts">
    <div id="fence-banner" class="banner-alert hidden">⚠ GEOFENCE BREACHED</div>
    <div id="battery-banner" class="banner-alert hidden">⚠ BATTERY LOW</div>
  </div>

  <div id="hud">
    <div class="hud-row"><span class="hud-label">Armed</span><span id="hud-armed" class="hud-value">--</span></div>
    <div class="hud-row"><span class="hud-label">Mode</span><span id="hud-mode" class="hud-value">--</span></div>
    <div class="hud-row"><span class="hud-label">Battery</span><span id="hud-battery" class="hud-value">--</span></div>
    <div class="hud-row"><span class="hud-label">GPS</span><span id="hud-gps" class="hud-value">--</span></div>
    <div class="hud-row"><span class="hud-label">Alt</span><span id="hud-alt" class="hud-value">--</span></div>
  </div>

  <div id="controls-top">
    <button id="btn-arm" class="btn btn-arm">ARM</button>
    <button id="btn-disarm" class="btn btn-disarm">DISARM</button>
    <select id="mode-select" class="btn">
      <option value="STABILIZE">STABILIZE</option>
      <option value="ALT_HOLD">ALT_HOLD</option>
      <option value="LAND">LAND</option>
    </select>
    <button id="btn-trim-toggle" class="btn">TRIM</button>
  </div>

  <div id="trim-panel" class="hidden">
    <div class="trim-row">
      <span class="trim-label">Roll</span>
      <button class="btn trim-btn" data-trim="x" data-dir="-1">−</button>
      <span id="trim-x-value" class="trim-value">0</span>
      <button class="btn trim-btn" data-trim="x" data-dir="1">+</button>
    </div>
    <div class="trim-row">
      <span class="trim-label">Pitch</span>
      <button class="btn trim-btn" data-trim="y" data-dir="-1">−</button>
      <span id="trim-y-value" class="trim-value">0</span>
      <button class="btn trim-btn" data-trim="y" data-dir="1">+</button>
    </div>
    <div class="trim-row">
      <span class="trim-label">Yaw</span>
      <button class="btn trim-btn" data-trim="r" data-dir="-1">−</button>
      <span id="trim-r-value" class="trim-value">0</span>
      <button class="btn trim-btn" data-trim="r" data-dir="1">+</button>
    </div>
    <button id="btn-trim-reset" class="btn btn-disarm">Reset trims</button>
  </div>

  <div id="sticks">
    <div class="stick-block">
      <div class="throttle-cluster">
        <input type="range" id="thrust-fine" class="thrust-fine-slider" min="0" max="150" value="0" step="1" orient="vertical" aria-label="Fine thrust, 0 to 15 percent">
        <canvas id="stick-left" class="stick" width="200" height="200"></canvas>
      </div>
      <div id="readout-left" class="stick-readout">throttle 0 · yaw 0</div>
      <div id="thrust-fine-value" class="stick-readout">fine thrust 0.0%</div>
    </div>
    <div class="stick-block">
      <canvas id="stick-right" class="stick" width="200" height="200"></canvas>
      <div id="readout-right" class="stick-readout">roll 0 · pitch 0</div>
    </div>
  </div>

  <div id="gamepad-indicator" class="hidden">Gamepad connected — virtual sticks disabled</div>

  <script src="joystick.js"></script>
  <script src="app.js"></script>
</body>
</html>
