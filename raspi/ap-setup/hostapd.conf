# hostapd config for the Raspi's dedicated control-link WiFi AP.
# Copy to /etc/hostapd/hostapd.conf and reference from /etc/default/hostapd
# (DAEMON_CONF="/etc/hostapd/hostapd.conf").
interface=wlan0
driver=nl80211
ssid=drone-control
hw_mode=g
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=CHANGE_ME_BEFORE_FIRST_BOOT
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
